name: hommexx-unit-tests

on:
  # Runs on PRs against master
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - '.github/workflows/hommexx-unit-tests.yml'
      - 'components/homme/**'

  # Manual run is used to bless
  workflow_dispatch:

  # Also run nightly
  schedule:
    - cron: '0 7 * * *'  # Runs at 7 AM UTC, which is midnight MT during Standard Time

concurrency:
  # Two runs are in the same group if they are testing the same git ref
  #  - if trigger=pull_request, the ref is refs/pull/<PR_NUMBER>/merge
  #  - for other triggers, the ref is the branch tested
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpu-gcc:
    runs-on:  [ubuntu-latest]
    name: cpu-gcc
    steps:
      - name: install dependencies
        run: |
          sudo apt-get install -y libblas-dev liblapack-dev libopenmpi-dev openmpi-bin
          mkdir ${GITHUB_WORKSPACE}/e3sm
      - name: Check out the repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          show-progress: false
          submodules: recursive
          path: e3sm/source
      - name: Show action trigger
        uses: ./e3sm/source/.github/actions/show-workflow-trigger
      - name: trilinos-clone
        run: |
          cd ${GITHUB_WORKSPACE}
          mkdir trilinos && cd trilinos
          git clone https://github.com/trilinos/Trilinos.git source
      - name: trilinos-config
        run: |
          cd ${GITHUB_WORKSPACE}/trilinos
          mkdir build && cd build
          cmake -Wno-dev \
            -D CMAKE_CC_COMPILER:STRING=gcc                               \
            -D CMAKE_CXX_COMPILER:STRING=g++                              \
            -D CMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/trilinos/install  \
            \
            -D Trilinos_ENABLE_EXAMPLES:BOOL=OFF                          \
            -D Trilinos_ENABLE_TESTS:BOOL=OFF                             \
            -D Trilinos_ENABLE_OpenMP:BOOL=OFF                            \
            -D Trilinos_ENABLE_ALL_PACKAGES:BOOL=OFF                      \
            -D Trilinos_ENABLE_ALL_OPTIONAL_PACKAGES:BOOL=OFF             \
            -D Trilinos_ENABLE_Sacado:BOOL=ON                             \
            \
            -S ${GITHUB_WORKSPACE}/trilinos/source
      - name: trilinos-build-install
        run : |
          cd ${GITHUB_WORKSPACE}/trilinos/build
          make -j4 install
      - name: hommexx-configure
        run: |
          cd ${GITHUB_WORKSPACE}/e3sm
          export Trilinos_ROOT=${GITHUB_WORKSPACE}/trilinos/install
          mkdir build && cd build
          cmake \
           -D CMAKE_CXX_COMPILER:STRING=mpicxx        \
           -D CMAKE_C_COMPILER:STIRNG=mpicc           \
           -D CMAKE_Fortran_COMPILER:STRING=mpifort   \
           -D CMAKE_BUILD_TYPE:STRING=DEBUG           \
           \
           -D HOMME_FIND_BLASLAPACK:BOOL=ON           \
           -D HOMME_AMDIS_PROJECT:BOOL=ON             \
           -D HOMMEXX_ENABLE_FWD_SENS:BOOL=ON         \
           -D HOMMEXX_ENABLE_FAD_TYPES:BOOL=ON        \
           -D HOMMEXX_BFB_TESTING:BOOL=ON             \
           -D BUILD_HOMME_WITHOUT_PIOLIBRARY:BOOL=ON  \
           \
           -S ${GITHUB_WORKSPACE}/e3sm/source/components/homme
      - name: hommexx-build
        run: |
          cd ${GITHUB_WORKSPACE}/e3sm/build
          make -j4
      - name: hommexx-test
        run: |
          cd ${GITHUB_WORKSPACE}/e3sm/build
          ctest --output-on-failure -L unit
      - name: Upload log files
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            e3sm/build/CMakeCache.txt
            e3sm/build/Testing/Temporary/Last*
          retention-days: 14
